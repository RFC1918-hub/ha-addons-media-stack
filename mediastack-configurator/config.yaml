name: Media Stack Configurator
description: >
  Automatically wires together Radarr, Sonarr, Prowlarr, qBittorrent and Jellyfin
  after you have installed them via Alexbelgium's addon repository. Run once and it
  connects everything — download clients, indexer apps, and root folders.
  Also syncs TRaSH Guides quality definitions via Recyclarr.
version: "2.4.6"
slug: mediastack-configurator
init: false
host_network: true
hassio_api: true
hassio_role: manager
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: once
boot: manual
map:
  - addon_config:rw
  - media:rw
  - config:ro
options:
  radarr_port: 7878
  sonarr_port: 8989
  prowlarr_port: 9696
  qbittorrent_port: 8080
  qbittorrent_username: admin
  qbittorrent_password: ""
  jellyfin_port: 8096
  movies_path: /media/movies
  tv_path: /media/tv
  downloads_path: /media/downloads
  service_timeout: 300
  recyclarr_enabled: true
schema:
  radarr_port: int
  sonarr_port: int
  prowlarr_port: int
  qbittorrent_port: int
  qbittorrent_username: str
  qbittorrent_password: password
  jellyfin_port: int
  movies_path: str
  tv_path: str
  downloads_path: str
  service_timeout: int
  recyclarr_enabled: bool
  radarr_api_key: "str?"
  sonarr_api_key: "str?"
  prowlarr_api_key: "str?"
